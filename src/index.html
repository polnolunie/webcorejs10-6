<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title><%= htmlWebpackPlugin.options.title %></title>
    <link rel="stylesheet" href="/src/scss/style.css" />
  </head>
  <body>
    <div class="header"
      ><h2>FIND REPOSITORIES QUICKLY</h2>
      <p class="comment-Habsida">
        Search and discover GitHub repositories here
      </p>
      <br />
      <p class="comment-hint"> for JavaScript: Core 10.6 </p>
    </div>
    <div class="search" style="display: auto">
      <div>
        <div class="searchIndicator">
          <svg
            alt="Search"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            width="24"
            height="24"
            style="transform: scale(1)"
          >
            <path
              d="M16.32 14.9l5.39 5.4a1 1 0 0 1-1.42 1.4l-5.38-5.38a8 8 0 1 1 1.41-1.41zM10 16a6 6 0 1 0 0-12 6 6 0 0 0 0 12z"
            ></path>
          </svg>
        </div>
        <form>
          <input type="text" placeholder="Search for repositories..." />
        </form>
        <ul class="autocompleteList"></ul>
      </div>
    </div>
    <div class="savedRepositories-wrapper">
      <div class="headerforSavedList">Saved repositories</div>
      <ul class="savedRepositoriesList"></ul>
    </div>
    <script src="/src/js/index.js"></script>
  </body>
</html>
